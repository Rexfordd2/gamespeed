<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">GameSpeed social preview</title>
  <desc id="desc">GameSpeed reaction training for athletes and gamers</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#02070D" />
      <stop offset="55%" stop-color="#071620" />
      <stop offset="100%" stop-color="#04130F" />
    </linearGradient>
    <radialGradient id="glowA" cx="20%" cy="25%" r="42%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.22" />
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glowB" cx="85%" cy="80%" r="48%">
      <stop offset="0%" stop-color="#4ADE80" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#4ADE80" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glowA)" />
  <rect width="1200" height="630" fill="url(#glowB)" />

  <g transform="translate(84 86)">
