    <circle cx="96" cy="96" r="49" fill="none" stroke="#86EFAC" stroke-width="10" />
    <circle cx="96" cy="96" r="18" fill="#ECFDF5" />
  </g>

  <g fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif">
